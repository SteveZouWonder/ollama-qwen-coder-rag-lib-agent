name: Release Build

# 触发方式：
#   1) 推送 v* tag（如 v1.0.0）自动构建并发布到 GitHub Release
#   2) Actions 页面手动触发（workflow_dispatch），可输入版本号
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不含 v 前缀，例如 1.0.0）'
        required: true
        default: '0.0.0'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 解析版本号（tag 或手动输入）
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Resolve and validate version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          # 去除可能误带的 v 前缀，并校验语义化版本格式 X.Y.Z[-suffix]
          version="${version#v}"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$'; then
            echo "::error::版本号「$version」不符合语义化版本规范（期望 X.Y.Z，例如 1.0.0）"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "✅ 解析到版本号: $version"

  # ---------------------------------------------------------------------------
  # Windows: PyInstaller -> Inno Setup .exe
  # ---------------------------------------------------------------------------
  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: pyinstaller packaging/cerebro.spec --noconfirm

      - name: Ensure Inno Setup Simplified Chinese language file
        shell: pwsh
        run: |
          # Inno Setup 默认不含简体中文语言文件，尝试下载到 Languages 目录。
          # 下载失败不致命：installer.iss 会条件检测该文件，缺失时降级为纯英文。
          $isDir = "C:\Program Files (x86)\Inno Setup 6"
          $langDir = Join-Path $isDir "Languages"
          $target = Join-Path $langDir "ChineseSimplified.isl"
          if (-not (Test-Path $target)) {
            New-Item -ItemType Directory -Force -Path $langDir | Out-Null
            $url = "https://raw.githubusercontent.com/kira-96/Inno-Setup-Chinese-Simplified-Translation/main/ChineseSimplified.isl"
            try {
              Write-Host "Downloading ChineseSimplified.isl ..."
              Invoke-WebRequest -Uri $url -OutFile $target -UseBasicParsing
              Write-Host "Downloaded: $target"
            } catch {
              Write-Host "::warning::下载中文语言包失败，安装器将仅提供英文界面。$_"
            }
          }

      - name: Build installer with Inno Setup
        run: |
          iscc /DAppVersion=${{ needs.prepare.outputs.version }} packaging\installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/installer/*.exe

  # ---------------------------------------------------------------------------
  # macOS: PyInstaller -> .app -> ad-hoc 签名 -> .dmg
  # ---------------------------------------------------------------------------
  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build with PyInstaller
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: pyinstaller packaging/cerebro.spec --noconfirm

      - name: Package (ad-hoc sign + dmg)
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          chmod +x packaging/macos_package.sh
          packaging/macos_package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg

  # ---------------------------------------------------------------------------
  # Linux: PyInstaller -> AppImage
  # ---------------------------------------------------------------------------
  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system deps for AppImage
        run: |
          sudo apt-get update
          sudo apt-get install -y wget libfuse2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: pyinstaller packaging/cerebro.spec --noconfirm

      - name: Package AppImage
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          chmod +x packaging/linux_package.sh
          packaging/linux_package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  # ---------------------------------------------------------------------------
  # 汇总三平台产物并创建 GitHub Release
  # ---------------------------------------------------------------------------
  release:
    needs: [prepare, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for CHANGELOG + scripts)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整 tag 历史以计算「完整对比」链接的前序版本

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate SHA-256 checksums
        run: |
          mkdir -p artifacts/checksums
          (
            cd artifacts
            find . -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' \) \
              -exec sha256sum {} \; > checksums/SHA256SUMS.txt
          )
          echo "==> SHA256SUMS.txt"
          cat artifacts/checksums/SHA256SUMS.txt

      - name: Build release notes from CHANGELOG
        id: notes
        run: |
          version="${{ needs.prepare.outputs.version }}"
          # 计算上一个版本 tag（用于「完整对比」链接）。
          # 按语义化版本排序，取排在 v${version} 之前的那个 tag；
          # 若没有前序 tag，则回退用首个提交。
          prev="$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | awk -v cur="v${version}" '$0==cur{found=1; next} found{print; exit}')"
          if [ -z "$prev" ]; then
            prev="$(git rev-list --max-parents=0 HEAD | tail -1)"
          fi
          echo "prev=$prev"
          # 发布时 CHANGELOG 可能尚未归档（changelog job 在 release 之后才跑），
          # 因此优先提取 [vX.Y.Z] 区段，缺失时回退到 [Unreleased] 区段。
          changes="$(python scripts/bump_changelog.py extract --version "$version" 2>/dev/null || true)"
          if [ -z "$changes" ]; then
            changes="$(python scripts/bump_changelog.py extract --version unreleased 2>/dev/null || true)"
          fi
          if [ -z "$changes" ]; then
            changes="_本次发布未在 CHANGELOG 中记录具体变更。_"
          fi

          # 组装最终 release notes：固定安装说明 + CHANGELOG 正文。
          {
            echo "本地 RAG + 代码助手（基于 Ollama \`qwen2.5-coder\`）。"
            echo
            echo "## 📦 下载与安装"
            echo
            echo "| 平台 | 文件 | 安装方式 |"
            echo "|------|------|---------|"
            echo "| Windows | \`Cerebro-Setup-${version}.exe\` | 双击运行安装向导 |"
            echo "| macOS | \`Cerebro-${version}.dmg\` | 打开后拖入「应用程序」 |"
            echo "| Linux | \`Cerebro-${version}-x86_64.AppImage\` | \`chmod +x\` 后双击运行 |"
            echo
            echo "> 文件完整性校验见附件 \`SHA256SUMS.txt\`。"
            echo
            echo "## ⚙️ 运行前提"
            echo "应用依赖本地 **Ollama** 服务。首次启动会自动检测，"
            echo "若未安装会引导你安装 Ollama 并拉取所需模型"
            echo "（\`qwen2.5-coder:7b\`、\`nomic-embed-text:latest\`）。"
            echo
            echo "## 🍎 macOS 用户须知（重要）"
            echo "本应用为免费开源项目，**未购买 Apple 开发者证书**，故未做苹果公证。"
            echo "首次打开请：**右键点击 Cerebro.app → 选择「打开」→ 在弹窗中再点「打开」**。"
            echo "若提示「已损坏，无法打开」，请在终端执行："
            echo '```'
            echo "xattr -dr com.apple.quarantine /Applications/Cerebro.app"
            echo '```'
            echo
            echo "## 🚀 使用方式"
            echo "- 直接运行 = 系统托盘桌面应用（GUI）"
            echo "- 命令行模式 = 运行时加 \`--cli\` 参数"
            echo
            echo "---"
            echo "## 本次变更"
            echo
            echo "$changes"
            echo
            echo "**完整对比**：https://github.com/${{ github.repository }}/compare/$prev...v${version}"
          } > release_notes.md

          echo "==> release_notes.md"
          cat release_notes.md

      - name: Create / Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.prepare.outputs.version) || github.ref_name }}
          name: Cerebro v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: false
          # Release Notes 正文来自上一步从 CHANGELOG 提取并组装的 release_notes.md，
          # 与 CHANGELOG 内容保持一致；不再使用 GitHub 自动生成的 PR 列表。
          body_path: release_notes.md
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-dmg/*.dmg
            artifacts/linux-appimage/*.AppImage
            artifacts/checksums/SHA256SUMS.txt

  # ---------------------------------------------------------------------------
  # 自动归档 CHANGELOG：把 [Unreleased] 归档为本次发布的版本号，
  # 提交到新分支并创建 PR（不直接写 master，遵循仓库分支保护规则）。
  # 仅在「推送 v* tag」时运行；手动触发（workflow_dispatch）不归档。
  #
  # 前置要求（二选一，否则「创建 PR」会因权限失败）：
  #   1) 仓库 Settings → Actions → General → Workflow permissions
  #      勾选 "Allow GitHub Actions to create and approve pull requests"；或
  #   2) 配置具有 repo + PR 写权限的 PAT 到 secrets.CHANGELOG_PAT，
  #      并取消下方 token 行的注释。
  # ---------------------------------------------------------------------------
  changelog:
    needs: [prepare, release]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Archive [Unreleased] into version section
        id: archive
        run: |
          version="${{ needs.prepare.outputs.version }}"
          # 若 master 上该版本已归档（例如重复触发），跳过后续步骤。
          if grep -q "## \[v${version}\]" CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CHANGELOG 已包含 v${version}，跳过归档"
            exit 0
          fi
          python scripts/bump_changelog.py bump --version "$version"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.archive.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # 默认使用 GITHUB_TOKEN（需仓库勾选「允许 Actions 创建 PR」）。
          # 若改用 PAT，取消下一行注释并在仓库配置 CHANGELOG_PAT secret：
          # token: ${{ secrets.CHANGELOG_PAT }}
          base: master
          branch: chore/changelog-v${{ needs.prepare.outputs.version }}
          commit-message: "docs: archive CHANGELOG [Unreleased] into v${{ needs.prepare.outputs.version }}"
          title: "docs: 归档 CHANGELOG 到 v${{ needs.prepare.outputs.version }}"
          body: |
            自动归档：发布 `v${{ needs.prepare.outputs.version }}` 时，
            将 CHANGELOG 的 `[Unreleased]` 区段归档为
            `## [v${{ needs.prepare.outputs.version }}]`，并补回空的 `[Unreleased]`。

            请审核后合并到 `master`。
          delete-branch: true
          add-paths: |
            CHANGELOG.md
