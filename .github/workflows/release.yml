name: Release Build

# 触发方式：
#   1) 推送 v* tag（如 v1.0.0）自动构建并发布到 GitHub Release
#   2) Actions 页面手动触发（workflow_dispatch），可输入版本号
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不含 v 前缀，例如 1.0.0）'
        required: true
        default: '0.0.0'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 解析版本号（tag 或手动输入）
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Resolve and validate version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          # 去除可能误带的 v 前缀，并校验语义化版本格式 X.Y.Z[-suffix]
          version="${version#v}"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$'; then
            echo "::error::版本号「$version」不符合语义化版本规范（期望 X.Y.Z，例如 1.0.0）"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "✅ 解析到版本号: $version"

  # ---------------------------------------------------------------------------
  # Windows: PyInstaller -> Inno Setup .exe
  # ---------------------------------------------------------------------------
  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: pyinstaller packaging/cerebro.spec --noconfirm

      - name: Ensure Inno Setup Simplified Chinese language file
        shell: pwsh
        run: |
          # Inno Setup 默认不含简体中文语言文件，尝试下载到 Languages 目录。
          # 下载失败不致命：installer.iss 会条件检测该文件，缺失时降级为纯英文。
          $isDir = "C:\Program Files (x86)\Inno Setup 6"
          $langDir = Join-Path $isDir "Languages"
          $target = Join-Path $langDir "ChineseSimplified.isl"
          if (-not (Test-Path $target)) {
            New-Item -ItemType Directory -Force -Path $langDir | Out-Null
            $url = "https://raw.githubusercontent.com/kira-96/Inno-Setup-Chinese-Simplified-Translation/main/ChineseSimplified.isl"
            try {
              Write-Host "Downloading ChineseSimplified.isl ..."
              Invoke-WebRequest -Uri $url -OutFile $target -UseBasicParsing
              Write-Host "Downloaded: $target"
            } catch {
              Write-Host "::warning::下载中文语言包失败，安装器将仅提供英文界面。$_"
            }
          }

      - name: Build installer with Inno Setup
        run: |
          iscc /DAppVersion=${{ needs.prepare.outputs.version }} packaging\installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/installer/*.exe

  # ---------------------------------------------------------------------------
  # macOS: PyInstaller -> .app -> ad-hoc 签名 -> .dmg
  # ---------------------------------------------------------------------------
  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build with PyInstaller
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: pyinstaller packaging/cerebro.spec --noconfirm

      - name: Package (ad-hoc sign + dmg)
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          chmod +x packaging/macos_package.sh
          packaging/macos_package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg

  # ---------------------------------------------------------------------------
  # Linux: PyInstaller -> AppImage
  # ---------------------------------------------------------------------------
  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system deps for AppImage
        run: |
          sudo apt-get update
          sudo apt-get install -y wget libfuse2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: pyinstaller packaging/cerebro.spec --noconfirm

      - name: Package AppImage
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          chmod +x packaging/linux_package.sh
          packaging/linux_package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  # ---------------------------------------------------------------------------
  # 汇总三平台产物并创建 GitHub Release
  # ---------------------------------------------------------------------------
  release:
    needs: [prepare, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate SHA-256 checksums
        run: |
          mkdir -p artifacts/checksums
          (
            cd artifacts
            find . -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' \) \
              -exec sha256sum {} \; > checksums/SHA256SUMS.txt
          )
          echo "==> SHA256SUMS.txt"
          cat artifacts/checksums/SHA256SUMS.txt

      - name: Create / Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.prepare.outputs.version) || github.ref_name }}
          name: Cerebro v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: false
          # body 会被「前置」到 GitHub 自动生成的 commit/PR 列表之上：
          #   上半部分 = 下面的固定安装说明
          #   下半部分 = GitHub 自动汇总的本次变更（What's Changed / 贡献者 / 完整对比链接）
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-dmg/*.dmg
            artifacts/linux-appimage/*.AppImage
            artifacts/checksums/SHA256SUMS.txt
          body: |
            本地 RAG + 代码助手（基于 Ollama `qwen2.5-coder`）。

            ## 📦 下载与安装

            | 平台 | 文件 | 安装方式 |
            |------|------|---------|
            | Windows | `Cerebro-Setup-${{ needs.prepare.outputs.version }}.exe` | 双击运行安装向导 |
            | macOS | `Cerebro-${{ needs.prepare.outputs.version }}.dmg` | 打开后拖入「应用程序」 |
            | Linux | `Cerebro-${{ needs.prepare.outputs.version }}-x86_64.AppImage` | `chmod +x` 后双击运行 |

            > 文件完整性校验见附件 `SHA256SUMS.txt`。

            ## ⚙️ 运行前提
            应用依赖本地 **Ollama** 服务。首次启动会自动检测，
            若未安装会引导你安装 Ollama 并拉取所需模型
            （`qwen2.5-coder:7b`、`nomic-embed-text:latest`）。

            ## 🍎 macOS 用户须知（重要）
            本应用为免费开源项目，**未购买 Apple 开发者证书**，故未做苹果公证。
            首次打开请：**右键点击 Cerebro.app → 选择「打开」→ 在弹窗中再点「打开」**。
            若提示「已损坏，无法打开」，请在终端执行：
            ```
            xattr -dr com.apple.quarantine /Applications/Cerebro.app
            ```

            ## 🚀 使用方式
            - 直接运行 = 系统托盘桌面应用（GUI）
            - 命令行模式 = 运行时加 `--cli` 参数

            ---
            ### 本次变更
