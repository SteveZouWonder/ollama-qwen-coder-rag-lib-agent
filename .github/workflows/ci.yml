name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint bandit pip-audit pytest pytest-cov
        pip install -r requirements.txt
    
    - name: Code syntax check with Python compiler
      run: |
        git ls-files '*.py' | xargs -r python -m py_compile
        echo "✅ Python syntax check passed"
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.venv,build,dist
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,.venv,build,dist
      continue-on-error: true
    
    - name: Lint with pylint
      run: |
        git ls-files '*.py' | xargs -r pylint --exit-zero --output-format=text
      continue-on-error: true
    
    - name: Security check with bandit
      run: |
        bandit -r . -f json -o bandit-report.json --exclude ./venv,./.venv,./tests || true
        bandit -r . -lll -i --exclude ./venv,./.venv,./tests
      continue-on-error: false
    
    - name: Check for critical/high security vulnerabilities with pip-audit
      run: |
        pip-audit --requirement requirements.txt --format json --output pip-audit-report.json || true
        pip-audit --requirement requirements.txt || echo "⚠️ Some security vulnerabilities found, please review"
      continue-on-error: true
    
    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing --cov-report=html
    
    - name: Check test coverage
      run: |
        coverage report --fail-under=80
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      if: success()
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          pip-audit-report.json
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports
        path: |
          coverage.xml
          htmlcov/
    
    - name: Summary of results
      if: always()
      run: |
        echo "## 🎯 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ Completed Steps" >> $GITHUB_STEP_SUMMARY
        echo "- Python syntax check" >> $GITHUB_STEP_SUMMARY
        echo "- Code linting (flake8, pylint)" >> $GITHUB_STEP_SUMMARY
        echo "- Security scanning (bandit, safety)" >> $GITHUB_STEP_SUMMARY
        echo "- Test execution with coverage" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Security reports uploaded" >> $GITHUB_STEP_SUMMARY
        echo "- Coverage reports uploaded" >> $GITHUB_STEP_SUMMARY

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install pip-audit
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit

    - name: Run pip-audit for critical/high vulnerabilities
      run: |
        # CVE-2026-45829 (GHSA-f4j7-r4q5-qw2c): chromadb code-injection via trust_remote_code=True.
        # This project uses chromadb.PersistentClient locally and never enables trust_remote_code,
        # so the vulnerability does not apply. No fixed version of chromadb exists yet.
        pip-audit --requirement requirements.txt --format json --output pip-audit-check.json \
          --ignore-vuln CVE-2026-45829 || true
        echo "Checking for known vulnerabilities in dependencies..."
        if [ -f pip-audit-check.json ]; then
          vuln_count=$(python3 -c "import json, pathlib; data = json.loads(pathlib.Path('pip-audit-check.json').read_text(encoding='utf-8', errors='ignore') or '{}'); deps = data.get('dependencies', []) if isinstance(data, dict) else []; print(sum(len(d.get('vulns', [])) for d in deps if isinstance(d, dict)))")
          if [ "$vuln_count" -gt 0 ]; then
            echo "❌ Found $vuln_count known vulnerabilities in dependencies"
            echo "Please review pip-audit-check.json for details"
            cat pip-audit-check.json
            exit 1
          else
            echo "✅ No known vulnerabilities found in dependencies"
          fi
        else
          echo "⚠️ Could not parse pip-audit results"
        fi
      continue-on-error: false

    - name: Upload pip-audit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pip-audit-results
        path: pip-audit-check.json